body:
  text: 臨江里人朱文藻纂輯本寺住持釋真源參訂住持按本寺住僧自開山禪師而下千餘年閒茫無可攷本朝百數十年閒凡祖堂有位及有功於寺載在萬年簿有名號可攷者略加叙次錄之餘無攷者仍闕之其有散見各條者無論是住持與否悉附載焉但能略載其興建之績而於俗姓里居受具道行各事蹟皆不能詳葢各住持西歸建塔者祇三人又未有塔銘刻語錄者祗一人又別無著述是以邈無攷稽姑存大略以俟博聞者追憶而補所未備焉明義智厚禪師晉開運三年開山見本寺記略按各房追薦先師皆以明義宣教厚法師為開山始祖今首列於此各房不復備載真俊真傑如懃如懋如憲如慧如德明心明京明朗覺逸明曉海嵩惠諶智楠海瑞智桂覺遠右十八人俱見萬曆丁酉鐘銘稱本山比邱不知其孰為住持及是何僧職名不可沒因並列之內如德又見磬銘存如師南房山主崇禎戊寅里中屠玉存捨地七分零存如師就地募建禪堂三閒四航超海和尚係福嚴長房傳臨濟正宗第三十三世在本寺為中興第一代康熙丙申年里人吳岐生吳道深詣石門敦請來主席參者多至千餘指安禪接眾淨律為常整大殿剙大悲閣及禪堂方丈庫房齋堂宿雲堂柴房圊房以次而成壬寅六月退院雍正乙巳復主席師生於康熙壬寅八月廿二日圓寂於雍正戊申四月一日世壽六十有七塔院在扇子地普同塔西南居中面清宮港有語錄一卷板藏寺中按塔左右舊多蔭木久賢住寺日判賣與人今無存矣按語錄為侍者普兢編皆師住石門福巖餘杭龍泉及艮山崇福時法語懋華師西北房僧康熙丙子年殿堂坍頹捐金二十兩興修霽遠師懋華之徒康熙戊寅懋師病卒至丁亥歲師約同七房各捐金二十兩興造完功明滄師中房僧勝瑢之師康熙壬寅年因造大悲閣將已地內貼近客堂之左基地一分七釐歸寺取用其條粮仍自戶輸納勝瑢師中房僧康熙辛卯興建殿宇七房師皆殫力師更倍力於工作以上四人俱係房僧今以其有功於常住因詳列於此蔭寰培和尚康熙壬寅十月主席雍正乙巳春退院匡源洪和尚傳臨濟三十四世本寺第三代靜山相和尚傳臨濟三十四世本寺第四代乾隆甲子年修葺大殿塔院在四航和尚之左晚楓翹和尚傳臨濟三十四世塔院在四航和尚之右鑒開照和尚真如奇和尚俱傳臨濟三十四世善化孝和尚傳臨濟三十五世本寺第六代普懷權和尚傳臨濟三十五世住龍居寺往來本寺宏傳芳和尚傳臨濟三十五世會文源和尚傳臨濟三十六世普見嚴和尚傳臨濟三十七世融通和尚自四航和尚主席厯傳門人世守傳至融通漸見衰落廣瑞和尚融通之後有廣瑞和尚住持重加修葺寺後地埂周植松樟麻栗雜樹百餘株至今茂蔭以上二人並見乾隆四十八年公議單巨根和尚耳通菴僧曾住本寺乾隆辛未恭迎聖駕蒙賜佛像碑搨大能源和尚傳臨濟三十五世乾隆丁丑主席道宏和尚又號導鴻龍居寺普懷和尚法嗣傳臨濟三十六世乾隆乙未年主席殿宇佛像煥然一新住持三載交法弟道本代攝三年己亥復住道廣蓮和尚傳臨濟三十六世心一通和尚傳臨濟三十六世元係永濟菴僧與其徒道昌曾同修崇福與有力焉此語據道昌自述自求和尚自道宏住持之後無力撑持於四十八年二月癸卯歲開元並不請命自請自求和尚進院以致四祖門下眾師要究開元之罪併請自求手卷查係受怡堂和尚之傳亦從石祖之法根本一脈六可暫攝三年眾皆歡允特請六房檀那開單交代至四十九年三月甲辰歲會文交與立權和尚接手是年六月雨耕收此條見公議交單雨耕潤和尚南房僧傳臨濟三十七世乾隆甲辰年主席勸緣鑄鐵爐際元和尚與雨耕和尚同募鐵爐以上二人並見鐵爐題名久賢達聖和尚彌勒殿額作達權傳臨濟三十八世乾隆辛亥正月雨耕容照兩和尚交久賢主席勸募檀那周端書發心重建齋堂等處嘉慶戊午圓寂稑潤徹和尚嘉慶戊午六月主席行梆立關勸緣重建大殿辛酉正月殿工未畢退院玉山真源和尚烏程縣人出家孝豐廣濟菴稑潤法嗣嘉慶辛酉正月主席立志久住以期振興墜緒百廢具舉各房山主叢林之興廢全視各房為盛衰故各房興盛則寺可終不廢而各房之興又全恃有道行者以維持之庶可經久不絕則各房山主之賢者顧可沒而不書乎茲不能詳攷祇就各房住僧歲時頂禮之先師錄而存之以備攷云南房古彰玠竹亭懋文宇桓存如週已見住持恬然𥡥勉菴旭碧溪濂道生斆巨華瑛戒賓巖傑峯碧峯岡玉溪琳美中琇納菴倫東北房寅菴昇東林珩養心傑幼心愈月泉奇雲峯㵰瑞芝蘭宗如本靜安悰德明儒瑞華明爾昌順能通貫量海崙啟祥和文學和松崖山西房大用成天香芝一山森東明旵楚山瑞圓中鏡韋菴儒無心志靜巖曉秀峯遠敬巖嵩茂林楠信齋諶天然福觀心定見如昭我元慈數元一樸先綺妙元微省愚覺一如性旭先煜燦章珂德初虔明達洪恒宣雲天益仁能高相皓成週豁然舟曉聞信按靜巖曉秀峯遠敬巖嵩茂林楠信齋諶疑即大殿鐘銘所列之明曉覺遠海嵩智楠惠諶也今未能臆定附識於此西北房怡泉㫤松坡慧月亭朗竹菴俊筠山德本菴遷靜雲時本元戒嵩隱岳妙宗英恒在修明懷炌慧高點按題門有狀元額為沈廷文立乃妙宗之俗家姪也中房古彰明適中逵天澤恩玉山潤玉菴瑢大堅鎧壽山仁小山懃愛山暹華峯山天香桂明齋諫自然裕益心宗通元茹繼山文心菴瑞心宇樑賓齋誠隱然綬明心富連如貽輔元正體乾修越凡煃瑞雲𬰏憲章屾悅山宏明滄浮勝瑢賓天如清大宗真元中慶按古彰明勝瑢俱已見前西南房聖益維成巨峯建宗附錄實彰號紫松祝髮於東郊崇福寺選僧宏法實彰預其數明年揚州天寧寺後常往來武林與報國楚木善所著詩文語錄名山房敝帚錄梓行按東郊即艮山門外自臨江鄉以南與慶春清泰兩門接壤皆可謂之東郊也悟明東城天妃宮僧乾隆辛亥助功德畫佛像三尊曹王十軸行素堂周羊氏重裝檀護按叢林有檀護佛法所賴以興也杭郡東鄉俗勤耕織居人天性慈善男女多精信佛法一村之中鐘鼓之聲不絕他郡所不及也崇福寺檀護助寺興修者屢矣而故籍無稽兹據記憶所及廣詢耆宿并近年善舉約略記之然善信眾多難以備載覽者勿譏其遺漏焉宋思山萬曆甲午復整寺宇蔡廷檀萬曆丁酉勸緣鑄鐘按鐘銘不止此一人因倚壁塵積不能拂拭摹錄舉一以槩其餘玉存諱爾綬崇禎戊寅捨地七分零建禪堂吳容菴諱君榮先世詳見前康熙丙子殿堂坍頹興造未遂而病篤命嗣子繼志完工吳岐生恒甫次子嗣容菴為後康熙辛卯興各殿宇工未畢而卒吳道深恒甫子岐生兄康熙戊戌秋議復整大殿曰弟功宜續父志當遵與季弟兩姪完其事按季弟字階三兩姪字西林仲皋沈天生康熙壬寅勸眾房換地按中房公議勸換地者不止沈天生一人名已詳前茲舉一以槩其餘劉元明事蹟無攷吳西林諱穎芳號臨江鄉人其用於佛事則稱名樹虛岐生長子讀書善詩多著述有臨江鄉人詩四卷刊行尤研究內典著唯識論文釋二卷又即其論中條例指授學者謂之五要須知論釋之外更有勸所緣緣論釋因明入正理論後記因明正理門論各一卷東城餘菴僧蓮印西城慧安寺僧超塵各受其書傳之常與超塵來寺中講論超塵閒止宿焉乾隆丙申與施煥章同募修彌六閣卒後長孫出雲次孫琅圃弟仲皋之子有孚並善繼先志常住多資其力陳嵇元山嘗過崇福寺追憶西林先生有詩云居士布金地一聲秋磬踈禪心風動後空腹樹焚餘寺中銀杏樹自焚片石文難得東林社已虛臨江遺澤近指點意何如施煥章乾隆丙申募修彌六閣翟美懷歲助齋糧供眾楊爾迪歲助齋糧燈油唐仲周宋憲章徐良臣祝君發屠搢坤趙武公俱時有樂施俞民瞻乾隆庚申助大殿石柱二根遇有修建復樂為捐助俞漢文諱起鳳捐助天王殿鋪磚吳隆昌諱文林乾隆癸丑與周端書湯明賢同建關帝等殿其子正華亦善體父志踴躍助捐姪士鼇字六擎姪孫啟存字心田樂善相繼無倦色周端書諱鳳超與繼室羊氏同修善果修建自關帝殿外若齋堂重建之功尤偉詳見達聖齋堂記中凡寺中題行素堂者皆其功德也祝廣倫同室沈氏法名永達皈依佛法廣倫歿後捐資助寺追薦冥福按自屠玉存以下二十一人報本堂有長生位屠文英諱憲臣玉存子康熙庚子同男仲源泓源立捨書撥地得半價入寺建九閒樓雍正丁未文英題額禪堂猶存文英生五子第四子諱潮字日昇生二子長右昌字巨川次右珍字大用巨川子舜風大用子履端凡遇寺內有修建之事謀慮經畫無不盡心盡力葢自玉存公捨地以來施功德於寺者五世於兹矣周辯乾隆甲辰助鑄香爐董得春董象春乾隆乙巳捨地八分歸寺為業近扇子地沈海雲乾隆己酉捨地七分零歸寺為業湯明賢乾隆癸丑助建關帝等殿章謙六乾隆庚申助大殿石柱陳邵同室俞氏乾隆庚申下菩薩立關勸緣時首捐重貲為眾緣倡沈懷宗陳俞氏樂輸之時勸緣之力為多楊建侯同室呂氏趙峻昭同室趙氏當道宏住寺募緣振興之時楊趙二宅各捐重貲內外工作及一切什器儲備無吝色鄭漢章李錦章孫茂昌章大有張聖和凡遇寺內有勸募營辦之事諸人皆不辭勞悴歡喜成就績不勝書王泰甫糶糴以營什一樂善好施有子名棫號芃潭能纘承父業暇則力學善書寺中聯額遺蹟極多年未三十而卒里人至今深惜之重建崇福寺碑記杭州素號佛地伽藍院寺庵刹之盛甲於他郡鐘鼓之聲相聞金碧相望名僧碩師代有其人然皆出江湖山墅之閒其東則無聞焉城東之古寺有三曰月塘曰殊勝崇福其一也年月浸久皆敗壞不可收拾基址穢蔓僧徒奔散名不揚於人為尋勝者之所不到康熙癸亥崇福重建至雍正乙巳厥功大成主寺四航和尚道風噓咻僧俗一時趨赴恐後近附遠徠罔不響應士大夫往往從而翱游周覽贊歎忽若創得學徒行僧橫擔望東而行如家有歸於是崇福遂為名精藍與湖山諸勝刹埒峙東西按縣志崇福始於後晉天福年中興廢歲月弗可考最後為明永樂時所治迄今三百年矣棟宇不庇佛坐草中里人吳翁過之惻然心動謀與同志成之會得疾不起疾革誡其仲子曰吾志欲重建崇福今病如是已矣爾能就吾願乎仲子曰惟力所能敢不嚴命是承乃以後三年之冬首捐銀若干視材督功巨細以躬不懈不苟厯二寒暑成大殿前殿山門若干楹廊房重屋耳房內宇若干椽瓴甓堦戺悉治牆壁悉飭法像悉光朱碧煤堊飛走之采悉新廚竈廁凊悉潔牀几凭坐𥁠㼜金當箕匕備用之物悉具既成而迎四公於福嚴奉為寺主至之日城野男女坌集香花塞道梵吹之聲隱振十餘里登堂說法人人挹光飲聲扶服樹領皆大歡喜具出意望外眾固以知崇福之大有興也居未幾傳述讚歎四方傾動時大雄山亦有崇福寺名甚著人稱小崇福以別之小崇福之名奮起於吳越而學徒之來者袂接踵及地陿不能容至假宇居習四公嘅然曰兹崇福雖古寺開堂自予始不為萬世之業無以報佛祖恩今學徒多借居而遠來之行僧過者無所專宿法堂禪堂齋堂方丈盡狹隘不足以發觀瞻迪道德心吾為始任可辭責乎乃大會僧俗語之故謀募建造時寺基無餘地附寺悉諸房僧居有建造必先移諸房功重費大眾咸驚然素伏師德不敢迕及募書四出眾施流委其徒某某宣其勞里人吳長公沈居士佐其勤房僧既徙九宇重建齋堂帶側前起法堂悉為重屋以貯徒眾爽亢整淨惟其固不惟其華始雍正某甲子至某甲子落成於乎非如來之廣大何以興廢基振法門非四公之道風動人何以誓宏願啟信心非耆善之至誠亦何以成茲偉功哉三者合而崇福興豈偶然乎四公諱超源某縣人吳翁諱鈞其子長諱道深仲諱岐生沈居士諱遇春恐後人無考綴緝其事而書之者仲之子穎芳也復系以頌曰維佛慈悲牖眾生普周四海玄教行龍象莊嚴崇浙杭新標百尺城東鄉瓦礫蔓草今道場旛幢金朱昭輝光渤海善成施果成大知識來橫海鯨捧拂宣闡微妙聲法雷一震羣夢驚邪櫱菀枯智性萌百川注壑波瀾清繼功次第搆恢宏更千萬年無圮傾踵我道躅堅化城右文見翟氏灝艮山雜志朱氏文藻所輯寺志未載當時似未上石也按咸湻臨安志城東有兩崇福院一在艮山門外一不系某所縣志謂慶春門外難消埠有崇福院殆即不系某所之院也惟兩院一建自雍熙一建自開運吳氏記引縣志崇福寺始於後晉天福年中又四公諱超源某縣人按寺志作超海疑均誤耳光緒乙酉新秋附刊此文因記丁丙
