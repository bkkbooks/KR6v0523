body:
  text: 臨江里人朱文藻纂輯本寺住持釋真源參訂總叙崇福寺在杭州府仁和縣臨安鄉八啚二十四都太平寰宇記仁和縣十二鄉咸湻臨安志仁和今管十一鄉第十一曰臨安鄉管里三曲江海門望潮杭州府舊志臨江鄉二十四都一十一里仁和縣趙志仁和縣在野十二鄉第十二曰臨江鄉管十一啚出艮山門咸湻臨安志杭州城東七門第七曰艮山門杭州府舊志艮山門東北第一門也東北隅有艮山故名門內有順應橋一名壩子橋俗因呼門為壩子門杭州府新志按今之艮山相傳元末築新城累土為之而艮山門之稱宋時已有舊志以為因山得名非是仁和志謂門位于艮易艮為山或近之過弔橋沿沙河迤東市店稠密俗呼沙河𪣟按字書無𪣟字詳玩音義乃壖字之轉音壖同堧而緣切韋昭曰堧河邊地張晏曰堧城旁地一曰城下田史記河渠書故盡河壖謂岸邊地也今路旁有碑額曰重築沙河壖石塘記蓋不從俗作𪣟也市盡處有橋俗呼俞家橋舊傳為東倉新橋杭州府新志艮山門東一里餘俞家壩側泄沙河水入清涼閘按清涼閘在沙河壖北側市中有衖通清涼橋俗呼閘衖又按閘衖者向為天仙廟山門額曰忠孝里今燬北至天仙廟又西通楊墅廟天仙廟祀孝子董永廟前有月河環至俞家橋向有老者曰舊傳劉誠意過此指此為藕形四下水溝通流為藕根廟為蓮花廟門蕩為荷葉蕩傍一井上有六柱石亭其形尖圓為蓮花蘂年久亭圮移六柱為俞家橋上石闌十餘年前重建天僊廟取回作捲棚柱過橋向東北行為吳家更樓按此為一村落南北居人三四十家村中南向大宅為吳氏之居吳氏先世居徽州休寧之黃源明時天綬公始遷杭官錦衣指揮傳二世尊周公廕襲指揮三世仲文公襲替始業儒為郡庠生四世景春公為鄉飲賓五世繼泉公生三子長瑞芝次環芝三珍芝珍芝公生子諱君榮號容庵候選州司馬善治生家饒裕周給閭里所居門外建樓跨途以備守望里人呼公名曰吳君遂稱此樓為吳君更樓後人避諱改曰吳家樓上舊奉城隍神今樓圮神像供於吳宅過更樓轉東直北經聖帝殿為九里松塘通下菩薩三里亭枸桔衖繭橋大路按聖帝殿故老相傳舊奉關帝為崇福寺伽藍神昔年迎天開河聖帝祈雨經此遇大雨少憩雨止再舁重不可移眾謂神意欲駐此也卜之得吉遂奉聖帝於殿中而奉關帝於殿右里中吳岐生家遇盜官為緝獲枷斃於此岐生夜過鬼輒為崇暗中見刀光而解乃建而新之又按九里松塘宋時舊名咸湻臨安志云蔡官人塘河在艮山門外九里松塘是也下菩薩亦宋時舊名今為土穀祠祀諸葛瑾廟門外左壁有石佛一龕佛像三尊合為一石舊湮井底今嵌廟壁佛像下節刻題名十一行文云臨安府城東新九里松下菩薩廟焚修香火善友係嘉興府行孝人口募緣刊鑿圓通聖像一龕并重建施水一所祈求豐稔國泰民安上答四恩三宥嘉熙元年四月初八日嘉興府行孝善友義庵周貴圓謹題據此可知九里松塘及下菩薩廟自南宋始矣石刻謂為新九里松則是始於嘉熙初元以前未有此名也未至聖帝殿東嚮數百步村居十餘家名花園衖園為屠氏先世之別墅奇花異果四時繁茂今為桑塍蔬圃矣過花園衖為聞王廟廟在路北南嚮大殿三楹後殿三楹奉土穀神前殿神像前栗主題曰溥澤侯左壁神榜題曰商勅臨安九里松九朝都土地勅封溥澤侯按聞王事蹟不可攷土人據稗說家商紂時聞太師當之故榜題商勅固屬不經然下文十五字則由來已久必有所本杭州之稱臨安府始於南宋高宗此地之稱九里松始於南宋理宗其曰九朝都土地者宋代南北各有九朝此云九朝必非南宋之九朝葢宋亡之後元人立廟何必復稱前代之九朝乎則所謂九朝者指北宋而言以臆度之當由高宗定都臨安以後扈蹕之人僑居此土追祀中原土穀之神立廟於此稱之曰九朝都土地者示不忘中原也神為聞姓封溥澤侯亦仍宋勅之舊攷聞姓僅見於正字通載宋咸平進士聞見自明以後乃有尚書聞淵明史有傳明末則有聞子將為杭郡名人可見吾杭聞氏大率為宋進士聞見之後則此聞王廟或亦北宋聞進士之後嗣有功於朝封號溥澤其子孫僑居此鄉立祠奉祀而年久遂奉為土穀神也杭郡土穀神有姓名者大半類是今未能詳攷姑備一說以俟博雅者論定焉廟中香火即崇福寺南房僧主祝史廟門外路南北嚮戲臺一座額題昭昔警今四字集朱子書臺左右有樟楓銀杏等大樹十餘株廟後同臺西一水環流曰清宮港東通寺前橋南通小顧家橋聞王廟東即崇福寺寺南嚮門外直南甬道一帶臨大路左右角大樟樹二株可二人合抱路東為興隆橋俗名寺前橋東通范家衖走馬塘大路南通永濟橋路南面寺有小蕩名曰骨池本寺各房共之崇福寺咸湻臨安志崇福院在艮山門外元係寶壽院祥符元年改賜今額又傳開運三年郡人以地易仁王院菜園建護國仁王院後改寶壽杭州府馬志崇福寺艮山門外宋雍熙閒建大中祥符初改今額後累燬明洪武中重建仁和縣趙志崇福寺在艮山門外臨江鄉宋雍熙閒建大中祥符元年改今額大觀閒燬紹興閒重建元末燬明洪武十六年復建二十四年立為叢林又云崇福院在慶春門外難消埠晉時為護國仁王院後改寶壽宋大中祥符閒賜今額元末燬明萬曆閒僧養虛重建觀察陳禹謨復題枕流院額杭州府新志崇福寺在艮山門外宋雍熙閒建大中祥符元年改今額大觀閒燬紹興閒重建元末燬洪武十六年復建立為叢林又云崇福院在慶春門外晉為護國仁王院宋大中祥符改額元末燬明萬曆閒重建按艮山門在城東北慶春門宋時為東青門在城東其地上下相距數里不能混也崇福院與崇福寺本是二名惟咸湻志謂之崇福院元係寶壽院祥符元年改額在艮山門外則非慶春門外難消埠之崇福院明矣嗣後府縣志皆稱為崇福寺而刪去寶壽舊額但云改賜今額夫不載舊額則何從改賜府縣志之誤顯然至仁和趙志乃以寶壽院額屬之難消埠之崇福院而於艮山門外之崇福寺不載寶壽則崇福寺之舊額究屬何名似係趙志有誤咸湻志為郡志之祖所載自屬可據當從之惟不詳寶壽之額始於何年據馬府志謂寺建於宋雍熙閒則寶壽之額當即始於是時趙縣志謂晉時為護國仁王院者自是難消埠崇福院額似非即此崇福寺也然本寺記略又但有護國而無寶壽則護國之額又非難消埠之崇福院矣今住持玉山親至難消埠徧詢耆老謂難消埠祗江沙一片久失其址而左近小庵數處亦並無崇福院之名葢院之頹廢已久矣府縣志但仍舊文編錄未嘗細攷其存亾則其誤無從辨析姑從其說以備攷而寺之開創從記略以為自晉開運三年為不失其舊也仁和趙志又云因果寺在艮山門外後晉開運二年建名崇壽宋大中祥符元年改是額元末兵燬明洪武初草葺二十四年併崇福寺萬曆壬子僧月居璽重建按此今謂之月居庵洪武閒併入崇福寺者今雖析出仍附載之崇福寺記略武林艮山之左古有九里松漫為平原石晉開運三年有明義智厚禪師始開此山名護國禪院大宋雍熙年閒大興之大中祥符閒改額崇福禪寺大觀閒兵燬紹興重建元末復燬洪武二十四年再創萬曆甲午歲有思山宋公復整崇禎戊寅里中玉存屠公捨地七分零本寺房僧存如師就地募建禪堂三閒本朝康熙丙子年殿堂坍頹西北房懋華師捐金二十兩里人容庵吳公主興修造戊寅歲懋師病卒中止丁亥歲懋師之徒霽遠師約同七房各捐金二十兩歸容庵公公即破土發木興造未遂而病篤命仲子岐生公繼志完工岐生公於辛卯歲興大殿天王殿兼創山門伽藍祖師兩廊清逸堂廚房等屋七房師亦皆殫力勝瑢師更倍力於工作至乙未年冬岐生公即同長兄道深公糾諸同志詣石門福嚴敦請超海和尚於丙申春來主席參者多至千餘指安禪棲眾淨律為常始成名刹而寮舍尚少是歲之暮岐生公卒戊戌秋復整大殿海公與道深公議完其缺略公曰弟功宜續父志當遵即與季弟兩姪謀完其事仍糾諸同志天生沈公等議勸眾房調換地基屋宇眾房允協海公復命諸職盡力募化檀護樂助是冬天生公道深公竭力共完勝事乃創建大悲閣改造三房於山門之左右庚子歲禪堂方丈庫房乃成辛丑夏華家衖有慈雲庵者因患海水拆施常住因建齋堂宿雲堂柴房圊房壬寅六月海公退院蔭寰培公主席乙巳春培公退院演教海公復主席是年七月十七日大悲閣始上樑此雍正已前本寺興建之始末也按此記略書於本寺萬年簿之首萬年簿者本寺住持授受之故籍也首云在晉開運三年有明義智厚禪師始開此山名護國禪院大宋雍熙年閒大興之大中祥符閒改額崇福禪寺石晉為五代時國開運乃出帝紀年時吳越建國錢王元瓘奉晉正朔故開運三年實吳越錢王時事明義智厚禪師開山名護國禪院似即仁和趙志所載難消埠崇福院晉時為護國仁王院者據志則屬之彼處據記略則屬本寺厯世久遠究不知孰是也又記略但稱大宋雍熙年閒大興之而不載寶壽院額似乎寶壽之額原非本寺所有然則咸湻志之稱崇福院在艮山門外元係寶壽者將何屬耶同一大中祥符元年既改護國院為崇福寺又改寶壽院為崇福院而咸湻志無明文後之府縣志又不加辨析此疑終不能明矣府縣志但云大觀閒燬而記略云兵燬大觀閒杭州無兵戈之事則云兵燬記略誤也本寺修建原委本寺自明洪武二十四年立為叢林至大清順治閒坍塌康熙五十九年閒各檀護迎四航和尚主席復興乾隆甲子秋靜山和尚修葺大殿四十年九月本寺兩序鄰房尊宿至皋亭龍居寺迎道宏和尚主席四十一年行梆勸募蒙施煥章吳西林同募善信於十一月興工先修彌六閣四十二年春修禪堂冬修天王殿關帝殿併莊嚴佛像五十六年二月文賢和尚主席周圍築牆一百三十堵造伽藍殿五閒五十八年造報本堂五閒關帝殿五閒重修齋堂五閒五十九年造廚房五閒小房八閒祖師殿五閒重裝大佛三尊韋馱一尊嘉慶三年六月稑潤和尚主席五年冬鳴梆立關募緣重建大殿六年正月稑公退院法嗣玉山和尚主席竭力振興事事務期整頓按此條亦載本寺萬年簿而加以增潤者也
