body:
  text: 崇福寺位於浙江臨安鄉艮山門外石晉開運三年九四六明義智厚禪師始開此山名護國禪院一作原名寶壽院宋雍熙間九八四九八七大興之大中祥符元年一八改稱崇福寺大觀間一一七一一一燬紹興間一一三一一一六二重建元末又燬明洪武十六年一三八三復建二十四年一三九一立為叢林清初殿宇坍塌康熙五十九年一七二四航和尚復興乾隆九年一七四四靜山和尚修葺大殿乾隆嘉慶兩朝一再增修頗具規模本寺住持僧自明義智厚禪師而下千餘年間茫無可考自清康熙間四航超海和尚為本寺中興第一代守臨濟一宗以下住持寺萬年簿皆有記錄其有功於本寺且有行誼可考者有靜山相和尚廣瑞和尚道宏和尚心一通和尚自求和尚久賢達聖和尚玉山真源和尚等為禪宗臨濟祖庭之一寺舊無記錄嘉慶六年一八一邑人朱文藻與住持釋真源創修寺志釐為四卷分門有五總敍寺宇寺產住持檀護總敍一門載本寺之簡史寺宇上列有關帝殿關帝笤經體例不純寺宇下載本寺殿閣堂房之建置寺產則錄本寺之田產與檀樾之佈施住持一門則載四航超海和尚迄玉山真源和尚檀護一門載宋思山等三十四人光緒重刻本後附重建崇福寺碑記道光二十二年一八四二章庭棫應住持釋懋成之請據寺萬年簿編續志一卷首錄住持檀護次載事實懋成彙集有關題詩以附之以補嘉慶道光間四十年之文獻按寺志之史源除輯諸縣志外大抵據寺之萬年簿所記簡略要存古寺之零篇也茲據清光緒七年一八八一錢塘丁氏刋本景印崇福寺志叙武林艮山門外庵院櫛比半為吳越兩宋所剙而崇福寺獨壯麗閎深為羣刹之冠然自吳越剙建以來千餘年閒紀載缺遺碑碣無攷蓋由寺無恆產主席更易不常高僧不能聚集至國朝康熙閒始有捐田捨地之檀護寺中稍有稻粱可資而主僧率不暇為文飾之務地處郊坰騷人詞客足跡又不恆至以致舊述無稽水月居額跋雖云有舊志蒐之無所得東鄉諸古刹之有專志者惟辯利院而此寺較古不可無志以垂久遠文藻移家臨江鄉二十餘年村廬距寺數百武不辭弇陋與玉山上人諮訪耆宿參稽故籍剏成寺志釐為四卷新模憑諸目見舊事得之傳聞譌誤遺漏知所不免詳贍增採俟諸後來剞劂既竣爰書簡端嘉慶六年歲次辛酉九月朔日朱文藻識崇福寺圖御製崇福寺碑記乾隆元年昔如來以正法眼藏涅槃妙心傳付摩訶迦葉自達磨來茲震旦提倡宗乘一花五葉遞相祖述厥後曹溪分派臨濟號為正宗棒喝之用實與靈山拈花面目後先同揆祖印相承提持接引信覺海之津梁靈山之通軌也近日叢林刹宇遍天下皈依釋氏者雖眾而宗風頺替象教日衰我皇考世宗憲皇帝聖明天縱萬幾餘暇了達性源旁及內典憫正法之不傳整飭宗門諄懇告誡冀其真參實悟以續曹溪臨濟之一燈凡昔時尊宿開堂駐錫之地具荷皇慈次第修葺杭州艮山門外崇福寺者臨濟祖庭之一也剏於宋燬於元復建於明厯年七百餘載琳宮傾圮鐘鼓寂寥皇考命以內幣之嬴重加修整經始於雍正十二年九月落成於十三年七月梵宇莊嚴禪林載煥用記始末勒諸貞珉維爾緇流居是寺者當念世宗憲皇帝護持正梵之深恩各守戒律努力參究實具正知正見上接諸宗之傳無令塗汙慧命垢濁法輪朕實有望焉右見皇朝文典卷九十九乾隆元年編修臣王峻恭擬
