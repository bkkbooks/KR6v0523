body:
  text: 臨江里人朱文藻纂輯本寺住持釋真源參訂寺宇下天王殿本寺第二進由關帝殿後中行甬道左右列大松數株殿左大樟樹一株樹外左右土牆各一帶左牆二門一通園地即東房址一通中房出入右牆一門通西房出入牆外路南北蔬圃一方為常住產殿內中奉彌勒佛題楣額曰生歡喜心乾隆丁酉信士沈容鼎劉憲華沈虔立甲寅小雪前五月住持達權重修淨土學人蔣仁書佛龕上額曰無如一笑石帆顧升書龕後北嚮奉韋馱立像極靈兩次行梆募緣奉以護法有侮慢者輒示靈異左右塑四天王像按記略載天王殿興於康熙辛卯年至乾隆丁酉冬重修大殿本寺第三進康熙辛卯年興修戊戌年復整乾隆甲子年修葺嘉慶庚申年重建殿三檻中四柱新易以石題聯云崇舊宇以煥新模佛日慈雲幢擁香林雄北郭福桑田而祐松里晨鐘暮鼓燈傳梵唄震東皋楷書勒柱上中奉佛像三尊殿左鐵鐘一口萬曆丁酉年九月本山比邱真俊真傑如懃如懋如憲如慧如德明心明京明朗覺逸明曉海嵩惠諶智楠海瑞薦考姚公妣陳氏智桂薦妣張氏募化沙門覺遠勸緣弟子蔡廷檀等餘不備錄佛前鐵磬一口萬曆廿五年本山比邱如德立殿左右柱題聯云具大人相乃分身百億願作中天調御三身四智內不覺重開斯面目證無上士已徧覆大千欲度博地凡夫十刹五山中何妨復駕此招提後學超海題印曰七十一世孫四航海印九沙萬經書八分書乾隆五十九年甲寅秋八月住持達聖重修殿門外甬道上鐵鼎爐一座右耳已失乾隆庚午年鑄庭左右有大銀杏二株左一株舊有寄生木樟槐穀及月季花等七種穴藏松鼠乾隆甲辰年捕鼠者熏穴遺火焚樹今惟右一株存西牆腳有雍正乙巳辦糧碑嵌砌模糊僅辨數字吳頴芳西林崇福寺詩古寺松塘近鳴鐘午梵聞江山門獨向花竹徑平分客到茶烹雪僧高衲貯雲日斜村路靜林鳥自為羣翟灝晴江崇福寺鐘聲詩百八洪音起村齋夢正闌一時增壯悔五夜逼秋寒菘圃清霜粲桑塍白月殘老僧頭似雪坐破幾蒲團任經抑齋崇福寺前晚步詩東皋望不極野色淡斜睴木落半山出風高一隼飛疏鐘鳴古寺流水咽荒磯信步渾忘遠人家半掩扉翁永錫玠山晚過崇福寺詩逶迤來古寺夕照尚餘紅麋鹿遙相伴藤蘿近自叢雲翻水漾月玉響竹敲風清磬一聲下悠然萬籟空沈鵬桐谿崇福寺銀杏詩盈極則含虛何物不可隸俗見別分支歸原惟一柢留此鎮三門迦陵時說偈伽藍殿在大殿左廡凡五閒康熙辛卯年建乾隆辛亥年重建中奉伽藍神五尊額曰吉祥擁護湯志高立王栻書聯曰白拂重揮新氣象烏藤再振舊家聲祖師殿在大殿右廡凡五閒康熙辛卯年建乾隆甲寅年重建中奉達摩祖師像大悲閣本寺第四進重樓五閒康熙戊戌冬剏建雍正乙巳秋工竣乾隆壬子正月七日坍毀後重建樓中奉大悲像額題前後佛身四字奚岡書左側舊有額書陀羅尼三字孫行書今佚樓下為禪堂又為戒堂門有額曰無礙隨心雍正五年屠憲臣題庭有鐵鼎爐一座乾隆四十九年周辯助南房勸緣僧雨耕住持際元九閒樓本寺第五進乾隆庚子建樓下中三閒為方丈有額曰高提祖印乾隆甲子秋為靜山和尚陳世倌書左有額曰祖林秀出孫效曾為導鴻和尚題左一聯曰天香直欲熏人醉仙骨何曾帶俗塵康熙辛丑仲春龍溪胡衡為四航和尚右一聯云竹籟松濤供棒喝花香鳥語逗禪機秋塍魯曾煜為靜山和尚題方丈後一聯云拓開兜率月吼破涅槃心閬庭楊士棟為四航和尚題後軒中間向年供奉心經碑搨一幅碑刻佛塔一座準提菩薩像居中周刻心經一卷準提左右刻二十諸天十八羅漢像旁題曰雍正十三年元旦刻和親王沐手敬書相傳乾隆十六年聖駕南巡住僧巨根迎駕蒙賜佛像二軸一是觀音像一即此幅其後住僧融通攜至揚州為永濟庵僧道昌所見請歸藏之今尚恭貯庵中方丈東三閒為庫房西三閒為西方丈為住持退院靜修之所額曰水月居跋云曷名乎水月仍其舊也曷取乎水月喻其道也古崇福寺自祥符之年改額以來星霜既移興廢屢矣惟舊志按此志不知河年所葺今已失傳載軒堂齋室一一可稱而原址不可一一尋矣甲寅春久公理古屋三楹以志中水月二字囑書於余且曰其屋與方丈鄰有樓可登四顧方塘園沼遠近相映帶有曲逕紆迴可達水上月夜時或步或登悉領是中趣味噫公之意吾能窺之矣嘗聞禪之妙境猶羚羊挂角香象渡河不著一毫痕迹今久公以水中之月悟之又與舊額相符所謂古今一貫心心相印矣他時秋月揚輝寒潭澄澈當與久公質諸居亦正宜也時乾隆五十九年上已前一日芃潭王棫并書其西直南抵天王殿西南隅舊有雲水堂延壽堂今皆廢燬成隙地樓上中三閒額曰彌六樓跋云崇福為艮山門外第一古刹年久頹廢龍居導鴻上人來主講席偽習宣空實華不瞬歲與斧斤雲集樓閣巍然予自廣陵為補書彌六樓舊額並媵數語以其勝願竟遂歡喜讚歎語以詳茲寺中興緣起乾隆丁酉沖寂觀三右三閒為西方丈樓祖堂在大殿之左南連伽藍殿面大殿東牆西嚮從大殿庭左側廊而入凡五閒中奉列世住持位報本堂在大殿之左南連祖堂面大殿東牆西嚮凡三閒中列護法長生位廚房在報本堂之右面大悲閣東牆凡三閒右一閒有井綆汲以通內廚內廚之東有屋八閒為柴房浴房圊房齋堂在大悲閣之左南連廚房北抵庫房樓五閒西嚮額題齋堂二字八分書跋曰崇福禪院古刹也歲久傾圮幸久公上人卓錫於斯苦志焚修善緣廣結致有居士端書周君矢願一力重修功甫半而周君遽逝善果未竟人共惜之然久公大願宏深當必有繼起而成有善因者行看斯刹重新有日余所深望焉乾隆五十九年歲次甲寅七月既望平江安陶吳豐書并識又懸額於門書重修齋堂記云齋所以供僧也堂所以受齋也啓十方之宏願收十方之供養存十方之僧眾是以叢林道場靡不有齋之堂焉乾隆壬子聖適住持崇福古寺見其前後寶殿左右廊廡藏經之樓參禪之堂凡修佛事之所雖垂霤重簷棼橑交接而不治者久矣殿之東偏有齋堂五閒其陊剝頹廢為尤甚癸丑春里中周居士端書重而新之噫工未竣而居士已作古人矣今居士鳩工於未逝之前能蕆事於既逝之後殆亦了此龍華會上一段因果若居士者可謂再知識矣聖作是記也一以感居士之樂施一以留此規模俾後之來者肯堂肯構踵而行之庶幾粥魚茶板有所安而道可永永矣乾隆甲寅年住持達聖識芃潭王棫書方丈後牆外從齋堂東北啟門而出有小逕沿牆而南可達柴房其北有埂向東而北而西達於西北房環埂密栽松樟麻栗雜樹百餘株埂內近牆東北角有小蕩蕩北桑園一方其右水田一方俱寺產埂外西北有井上覆以亭額曰井亭社井南近西北房西側有蕩曰放生池其埂之東北通九里松塘下菩薩大路本寺六房舊有七房內東房久廢地半歸寺內半歸西房南房在東北房之西聞王廟之東由廟中出入有屋二進額曰綠筠堂東北房在關帝殿之西南房之東由關帝殿西八字牆出入有屋二進額曰玉芝堂堂中又額曰沐塵堂王煒書西房在大殿之西東北房之後由天王殿前西牆出入有屋二進舊額白雲堂又曰羅吉堂庭有枸桔一本蟠為六層如塔門有額曰曲沼野航書門外大樟樹一株西北房在西方丈西側西房之後與西房同由天王殿前西牆出入有屋二進額曰永仁堂後有竹園中房在天王殿之東由殿前東牆出入有屋二進額曰大覺堂西南房今分居下菩薩上諸葛廟主廟中香火寺內無屋舊額曰水月堂寺產徵田共三十畝六分六釐三毫坐落亭子村岐生吳公捨入臨江八啚五甲內壬寅年入冊立戶崇福禪堂改戶彌六樓野航戶下計開號段畝分男字八百三十八號田二畝一分四釐三毫男字九百二十號田四畝六分零六毫男字九百二十一號田八畝九分五釐九毫男字九百四十號田一畝八分三釐三毫男字九百四十三號田一畝一分一釐五毫男字九百十九號田五分六共男字號內田十九畝一分五釐六毫吳逢源付潔字三百八十號田三畝二分九釐七毫坐落白馬塢潔字四百四十號田三畝四分五釐二共潔字號內田六畝七分四釐七毫吳逢源付效字九百四十四號田一畝五分五釐效字九百六十九號田二畝零二釐五毫二共效字號內田三畝五分七釐五毫吳逢源付男字五百零七號內田三畝五分七釐五毫吳起源付以上共田三十畝六分六釐三毫折地共三畝一分五釐又地二畝七分零九毫扇子地今有普同塔靜山和尚設存澧吳公捨吳守智付計開號段畝分而字一千四百零六號地六分三釐三毫沈雲付而字一千四百零八號地一畝零五釐四毫沈朴付而字一千四百零九號地二分七釐六毫沈朴付而字一千四百零十號地七分四釐六毫沈文御轉付四共而字號地二畝七分九毫換地號段畝分換中房地而字四百八十八號地三分二釐換南房地而字四百八十號地一分五釐八毫換西房常住地而字四百八十一號地四分七釐六毫換明甫師地而字四百七十九號地三分七釐五毫換明甫師地而字四百七十七號地一分九釐七毫五共地一畝五分二釐六毫歸東北房作新基兌東北房舊基地而字五百零二號地一畝二分二釐四毫而字五百號地一分二共地一畝三分三釐四毫此是東北房與常住所換之地作禪堂基址換西房明甫師地而字四百七十七號地三分四釐六毫換西北房地而字四百七十六號地五分九釐九毫換西北房地而字四百七十五號地四分七釐五毫三共地一畝四分二釐歸南房作新基兌南房地而字四百八十五號地七分五釐六毫而字五百零二號地一分而字四百八十號地三分一釐內一分五釐八毫歸東北房一分五釐二毫常住收三共地一畝一分六釐六毫此是南房與常住所換之地方丈九閒樓基地節錄捨書捨書屠文英仝男仲源泓源有祖遺桑地一則計三畝零坐落崇福寺禪堂屋後今因啟建佛閣需用其地因父玉存公向係本寺檀越文英繼父志憑眾議將地內撥二畝三分屠澎浚戶下付出折地歸崇福常住得半價銀十九兩計開四至蕩東南一方塊直落蕩西兩方塊今挑空靠蕩北首一橫埨今挑空橫埨北靠東三長埨今常住收花東至行路南至東南禪堂地中屠宅蕩西南禪堂地西至屠宅地北至屠宅地長埨後北至小路北首地上挑去泥土聽屠處畜養魚鱗水涸之日仍聽寺中挑泥應用康熙五十九年九月眾檀護沈天生顧捷三陳元章吳道深許殿書朱玉明許爾調裴際尤張彥博中房公議節錄鄰里馮昌期沈天生等先年因崇福寺坍損蒙吳君翁居士捐助修造而岐翁等延請四航和尚住持重整山門大殿起造寶閣兩序但寺基貼東一帶向與中房地界接壤其閒犬牙交錯彼此凹凸今中房明滄師將己地內貼近客堂之左基地計闊一弓一直上南長十弓又伽藍殿坐身基地南北計長六弓七分東西計闊三弓一分又上南小天井併基地南北長一弓七分東西闊五弓七分丈過合數共一分七釐俱照起造取足其用今君翁岐翁相繼去世而明滄師又已西歸其所用基地條糧理應本寺常住輸納今中房法嗣勝瑢等憑里鄰三面證明所用基地永歸崇福常住條糧仍歸中房自戶輸納既不失羽翼禪堂之功德又不沒先師歡喜之本懷子孫兩無異說議單各執一紙康熙六十一年六月鄰里朱玉明陳元章馮昌期沈天生屠文英高奕千劉吉臣道生師大徹師許殿臣元章師吳道深蔣鼎彝張際龍吳存澧爾昌師松隱師吳西林恆先師四航和尚惟高師勝瑢師蔭寰和尚悅山師玉成師董得春等捨書節錄捨書董得春象春向年先父存日續置荒地一則計七埨坐落仁邑臨江八啚而字號內折地八分零東至湯高二姓地界南至孫處墳地并崇福常住地界西至姜桓聰地界北至沈處義塜地界情愿施捨與崇福寺常住為業推收過割乾隆五十年九月族親鄰友孫茂昌董治田董天成董楚山吳出雲董尚周屠聖高住持雨畊沈海雲捨書節錄捨書沈海雲今將祖遺桑地三埨半計折地七分零坐落仁邑臨江八啚而字號方家井頭東至沈家地蕩為界南至沈家地界西至沈家地界北至沈處地界情愿施捨與崇福寺常住管業過戶辦糧乾隆五十四年正月見捨周青遠鄔瑞卿李錦章由單開載寶產乾隆四十年由單徵田三十畝七分九釐九毫徵地三畝六釐七毫折田三畝六分四釐六毫折地十四畝八分二釐七毫蕩三分二釐共五十二畝六分五釐九毫每年實完漕糧三石二斗一升一合每年實完條銀七兩三錢六分三釐
