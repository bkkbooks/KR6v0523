body:
  text: 臨江里人朱文藻纂輯本寺住持釋真原參訂寺宇上關帝殿本寺山門第一進凡五間門外左右八字牆各一帶左偏園地為東房舊址今歸寺內右牆小門通東北房出入殿為乾隆癸丑年里人吳隆昌等因舊重建按記略載康熙辛卯年創山門至乾隆丁酉之冬始修關帝殿至是年因舊規模而更新殿中供奉關帝祈禱極靈凡有事不決及蠶收葉價致誠卜笤無不響應關帝笤經按笤字本音條笤帚也未有作卜笤用者卜者所用古謂之杯珓以玉為之音教類篇云巫以占吉凶者演繁露云杯珓用兩蚌殼或用竹根字又或作筊石林燕語高辛廟有竹杯筊以一俯一仰為聖筊演繁露及石林燕語皆宋人之書則筊用竹根與俯仰為聖之制由來久矣今若從古當作筊字然時俗皆通用笤字遽易之恐啓後人之惑姑從俗作笤凡占者神前默禱以手舉笤二枚相合而擲于地三擲而畢以一仰一覆者為聖兩仰者為陽兩覆者為陰檢讀笤經以占吉凶經語舊書於粉板今里人金懷捐資刻本印以籤條占者免謄寫之勞矣經語甚朴遫無文韻多不諧經厯年久不無流傳之誤今悉仍原本鐫之不復改易取其徵驗已久也惟尋求命意頗與易理相通蓋易以陽為君子陰為小人君子道長則吉小人道長則凶故經語中以聖陽多者吉陰多者凶陽固合於君子之道而聖則陰陽相合也三擲分列為六猶易卦之有六爻一陽一陰謂之聖以配爻辭則先陽後陰即如三聖畫為六爻是為陽陰陽陰陽陰自下而上成既濟卦餘悉倣此推之今取易爻與經語參詳無不相合可知當時製經二十八字具有深意非漫爾為之也愚既悟此理因詳加疏解備載於此願與占者共曉然於神靈之不爽也三聖上上離下坎上既濟卦風雲際會正當時萬事亨通大可為三日幸逢歡喜到花開結子月光輝水火相交坎離既濟六爻之位各得其正故風雲際會萬事亨通也離光照水如花開之麗月光之輝六二爻辭云勿逐七日得此云三日者極言其速也聖陰陰下下震下坤上復卦初時有吉後頭凶莫把姦人作弟兄日後反成冤業債總然得利也空空一陽初復而羣陰尚蔽於上故初吉後凶易云朋來無咎然君子少小人多慮姦人為害也聖聖陽上上離下巽上家人卦貴人相濟合陽陰何慮前途不太平千里威風惟君有他年金谷自豐盈卦辭云女正位乎內男正位乎外是為陽陰相合之象上九一爻有孚威如經故云千里威風惟君有也聖聖陰中平離下坤上明夷卦男子行藏事合成買賣何須用一人防他久遠遭他計利不成時反受虧離為明象而逼於三陰小人間阻故買賣不宜專任一人也小人用事遭計受虧害所必至矣聖陽陽上上離下乾上同人卦無憂無慮太平年坐賈行商利萬千病者起身官事散求謀作事有良緣此卦為利涉大川之象故云商賈皆利文明以健故云病者起身君子能通天下之志故官事散卦名同人故謀事有良緣也聖陰陽下下震下巽上益卦倚勢須防有盡時莫持豪富莫欺貧神明不佑終非久禍患臨時悔也遲卦有損上益下之象益中有損戒人勿自恃也經云禍患臨時悔也遲蓋因易上九爻辭有立心勿恆凶之語而重警之聖陽陰中平離下震上豐卦好好行來又若何幾乎失卻在中途若非用力施為計反被旁人笑是非豐卦王假之勿憂宜日中日中與中途同一中也云勿憂則先已有憂故云幾乎失卻也離為明象震為動象明以動而後豐則當用力施為矣聖陽聖上上離下兌上革卦讀書及早登金榜吉人懷孕必生男丹詔貴人相接引憑他謀望總如斯革卦辭云文明以説悅大亨以正故云讀書早登金榜也離為火兌為澤水火相息又為生息之義故懷孕生男也湯武革命順天應人故云丹詔接引也聖陰聖中平震下坎上屯卦你問前程事若何小人阻間在中途勸君且過月半後任汝施為笑呵呵此卦乾坤始交而遇陰險故云中途阻隔也過月半者坎陷過中則震動奮發可任汝施為矣三陽上上乾下乾上乾卦三陽交泰似新年到處風光萬物鮮花滿路時香滿袖家家齊插嫩楊枝此卦六畫皆奇上下皆乾陽之純而健之至也三陽開泰正月之象萬物資始於卦為上吉三陰下下坤下坤上坤卦説起愁來愁更多禍從天降兩相磨寬心待過甲子日可保平安免難波羣陰相連愁多之象坤卦西南得朋東北喪朋安貞吉甲為東北子亦正北經故云過甲子日保平安也陰陽陽下下艮下乾上遁卦間是間非不可聽聽了卻是惱人心從今一筆鈎消罷各自尋門自主張遁卦為君子遠小人之象故云是非不可聽也凡事退避則小有利貞故云可各自主張也陽陰陰下下兌下坤上臨卦欲知機處未知機小輩陰人惹是非作急隄防須仔細免教骨肉兩分離臨卦為君子教思無窮乃尊長教戒小輩之意也卦象二陽上逼四陰剛不勝柔故云隄防須仔細也陽聖陰中平乾下坤上泰卦貴人相濟合陰陽何慮前途不吉昌勸君諸事須守舊免教後悔喜洋洋此卦為天地交泰之象經故云貴人相濟合陰陽也君子之道雖長而小人之道尚未盡消故須守舊陰聖陽中平艮下巽上漸卦説起愁來且莫愁先凶後吉不須憂當時卻被花徒哄更有收成在後頭卦有漸進之義故云先凶後吉彖辭云女歸吉故云被花徒哄也進得位往有功故云有收成在後陽陰聖中平兌下坎上節卦行人性急反成遲諸事還須許願心官事求謀因半阻始中還有好收成節有限止之義故急而反遲求謀半阻也兌説悅坎險説悅以行險故許願心以求説悅神明而後可行乎險也天地節而四時成故云有好收成也陰陽聖中平艮下兌上咸卦小人破戒禍相隨我若無私也不妨但把一心行正道自然天理不相虧此卦艮下兌上艮為山兌為澤山剛澤柔柔上剛下當以正心相感則無私矣無私則天理不虧小人不能為禍也陰陽陰上上艮下震上小過卦風霜磨盡好音來眼見青天紅日開否極泰來生造化訟事和同病好來卦辭有飛鳥道之音故云好音來也六五爻辭有密雲不雨故云眼見青天紅日也下艮為否極上震為泰來山上有雷為動蕩之象故訟和而病好也陽陰陽中平兌下巽上中孚卦好好行來自逞強慌忙作事欠端詳愚夫弄巧反成拙忍耐胸中免禍殃此卦上下四陽中容二陰乃中虛之象外實內虛象如舟楫逞強慌忙皆行舟之不穩者勿貪利涉而説悅遜以前則忍耐之受益多矣陽聖陽上上乾下巽上小畜卦君欲求謀事必諧吉人天相喜重來春風動處花香繞異日回頭著錦衣此卦為風行天上之象經故云春風動處花香繞也柔得位而上下應之故謀事必諧陰聖陰中平艮下坤上謙卦千般用力事難成才到完成又未成到底半凶有半吉小心守舊保安寧謙卦本六爻皆吉然地中有山則裒多益寡用力不易成也經云半凶半吉小心守舊者戒人勿自滿之意陽陽陰下下乾下震上大壯卦二人作事欠完成弄得頭齊腳不齊各自心來不一路方知臨了見分明四陽在下而有二陰阻之故云二人欠完成且為頭齊腳不齊之象也易云大壯大者正也正大而天地之情可見故云臨了見分明也陰陰陽中平坤下巽上觀卦弄成禍事不停留多少慌忙多少愁幸得後來好人解和同作事且安寧此卦四陰上逼二陽陽為陰掩故惹禍多愁然卦象為風行地上解散陰翳則後來安寧矣陽聖聖上上乾下坎上需卦勸君立志往前行名已成來利已成好似春花初發作猶如秋月正團圓需有利涉大川之象故云名成利成也陰聖聖上上艮下坎上蹇卦莫自欺瞞莫自乖初時小阻後平開問名求利終須有完成事業且開懷此卦二陰相阻於下上乃陰陽交濟故云初時小阻後平開也彖辭有利見大人貞吉之語故云問名求利終須有也陽陽聖上上乾下兌上夬卦及早施為正遇春一朝平步上青雲風平浪靜無他阻管取前程萬事亨夬卦以五陽決一陰三月之卦故云正遇春也彖辭謂揚于王庭孚號有厲故云平步青雲也陰陰聖下下坤下坎上比卦輕災薄悔已多年遲遲阻阻不周全從今略得些兒日別作生涯始得安此卦以一陽而阻於上下五陰之中故為多年遲阻之象然剛在中而上下應可以人來比我亦可我往比人則不妨別作生涯矣立笤下下立笤皆因不致誠未來問我我知因要知禍福因情事早向神前許願心立笤不分陰陽神明示戒惟有許願祈佑而已
